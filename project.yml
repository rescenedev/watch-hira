name: KanaStudy
options:
  bundleIdPrefix: com.zihado
  deploymentTarget:
    watchOS: "10.0"
    iOS: "17.0"
packages:
  KanaCore:
    path: KanaCore
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.16"
schemes:
  KanaStudy:
    build:
      targets:
        KanaStudy: all
    test:
      targets:
        - KanaStudyUITests
  KanaStudyiOS:
    build:
      targets:
        KanaStudyiOS: all
targets:
  KanaStudy:
    type: application
    platform: watchOS
    sources:
      - App
    dependencies:
      - package: KanaCore
      - target: KanaWidget
        embed: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKWatchOnly: YES
        INFOPLIST_KEY_CFBundleDisplayName: 일본어공부
        PRODUCT_BUNDLE_IDENTIFIER: com.zihado.kanastudy
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: 4
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 589U6DQJN8
  KanaStudyiOS:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: KanaCore
      - package: ZIPFoundation
      - target: KanaWidgetiOS
        embed: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: 일본어공부
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        PRODUCT_BUNDLE_IDENTIFIER: com.zihado.kanastudy.ios
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 589U6DQJN8
  KanaWidgetiOS:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
        excludes:
          - "*.plist"
    dependencies:
      - package: KanaCore
    info:
      path: Widget/Info-iOS.plist
      properties:
        CFBundleDisplayName: 오늘의 가나
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zihado.kanastudy.ios.widget
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 589U6DQJN8
        SKIP_INSTALL: YES
  KanaWidget:
    type: app-extension
    platform: watchOS
    sources:
      - path: Widget
        excludes:
          - "*.plist"
    dependencies:
      - package: KanaCore
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: 오늘의 가나
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zihado.kanastudy.widget
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 589U6DQJN8
        SKIP_INSTALL: YES
  KanaStudyUITests:
    type: bundle.ui-testing
    platform: watchOS
    sources:
      - UITests
    dependencies:
      - target: KanaStudy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.zihado.kanastudy.uitests
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 589U6DQJN8
